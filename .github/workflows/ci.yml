name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate backend imports
        run: python -m compileall app

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-backend:
    name: Docker Backend Build
    runs-on: ubuntu-latest
    needs: backend-ci
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/metripallavi/spaceops-monitoring-dashboard/backend:${{ steps.vars.outputs.image_tag }}
            ghcr.io/metripallavi/spaceops-monitoring-dashboard/backend:latest

  docker-frontend:
    name: Docker Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-ci
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/metripallavi/spaceops-monitoring-dashboard/frontend:${{ steps.vars.outputs.image_tag }}
            ghcr.io/metripallavi/spaceops-monitoring-dashboard/frontend:latest

  deploy-to-k8s:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs:
      - docker-backend
      - docker-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify cluster access
        run: kubectl get nodes

      - name: Check Helm
        run: helm version

      - name: Lint Helm chart
        run: helm lint ./helm/spaceops

      - name: Deploy with Helm
        run: |
          helm upgrade --install spaceops ./helm/spaceops \
            --set backend.image.repository=ghcr.io/metripallavi/spaceops-monitoring-dashboard/backend \
            --set backend.image.tag=${{ needs.docker-backend.outputs.image_tag }} 