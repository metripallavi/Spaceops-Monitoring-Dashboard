apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            - name: DATABASE_URL
              value: "{{ .Values.backend.env.DATABASE_URL }}"
            - name: APP_NAME
              value: "{{ .Values.backend.env.APP_NAME }}"
            - name: API_V1_PREFIX
              value: "{{ .Values.backend.env.API_V1_PREFIX }}"
            - name: DEBUG
              value: "{{ .Values.backend.env.DEBUG }}"